name: Build CI image

on:
  push:
    branches: [ "main" ]
    paths:
      - "DESCRIPTION"
      - "environment-test.yml"
      - "requirements-ci.txt"
      - "requirements-min.txt"
      - ".github/docker/ci/Dockerfile"
      - ".github/workflows/build-ci-image.yml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "DESCRIPTION"
      - "environment-test.yml"
      - "requirements-ci.txt"
      - "requirements-min.txt"
      - ".github/docker/ci/Dockerfile"
      - ".github/workflows/build-ci-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish CI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/docker/ci/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/mobility-team/mobility-ci:ubuntu-24.04-r-4.4.1-py3.12
            ghcr.io/mobility-team/mobility-ci:deps-${{ hashFiles('DESCRIPTION', 'environment-test.yml', 'requirements-ci.txt', 'requirements-min.txt', '.github/docker/ci/Dockerfile') }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
