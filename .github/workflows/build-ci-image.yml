name: Build CI image

on:
  push:
    branches: [ "main" ]
    paths:
      - "DESCRIPTION"
      - "environment-test.yml"
      - "requirements-ci.txt"
      - "requirements-min.txt"
      - ".github/docker/ci/Dockerfile"
      - ".github/workflows/build-ci-image.yml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "DESCRIPTION"
      - "environment-test.yml"
      - "requirements-ci.txt"
      - "requirements-min.txt"
      - ".github/docker/ci/Dockerfile"
      - ".github/workflows/build-ci-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish CI image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: .github/docker/ci/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/mobility-team/mobility-ci:ubuntu-24.04-r-4.4.1-py3.12
            ghcr.io/mobility-team/mobility-ci:deps-${{ hashFiles('DESCRIPTION', 'environment-test.yml', 'requirements-ci.txt', 'requirements-min.txt', '.github/docker/ci/Dockerfile') }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
