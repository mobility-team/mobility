name: Build runtime image

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - "DESCRIPTION"
      - ".github/docker/runtime/Dockerfile"
      - ".github/workflows/build-runtime-image.yml"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish the image to GHCR"
        required: true
        default: false
        type: boolean
      run_quickstart:
        description: "Run the full CI quickstart inside the image"
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  validate:
    runs-on: ubuntu-24.04
    outputs:
      mobility_version: ${{ steps.package-version.outputs.mobility_version }}
      mobility_minor_version: ${{ steps.package-version.outputs.mobility_minor_version }}
      mobility_package: ${{ steps.package-version.outputs.mobility_package }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Read package version
        id: package-version
        run: |
          version="$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")"
          minor_version="${version%.*}"
          package="mobility-tools==${version}"

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            package="mobility-tools"
          fi

          echo "mobility_version=${version}" >> "${GITHUB_OUTPUT}"
          echo "mobility_minor_version=${minor_version}" >> "${GITHUB_OUTPUT}"
          echo "mobility_package=${package}" >> "${GITHUB_OUTPUT}"
        shell: bash

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build runtime image for checks
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: .github/docker/runtime/Dockerfile
          load: true
          tags: mobility-runtime:test
          build-args: |
            MOBILITY_PACKAGE=${{ steps.package-version.outputs.mobility_package }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Check Python import
        run: |
          docker run --rm mobility-runtime:test python -c "import mobility; print(mobility.__file__)"
        shell: bash

      - name: Check Mobility setup
        run: |
          docker run --rm mobility-runtime:test python -c "import mobility; mobility.set_params(package_data_folder_path='/tmp/mobility-data', project_data_folder_path='/tmp/mobility-project', debug=True)"
        shell: bash

      - name: Run quickstart
        if: ${{ github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.run_quickstart) }}
        run: |
          docker run --rm \
            -e MOBILITY_PACKAGE_DATA_FOLDER=/tmp/mobility-data \
            -e MOBILITY_PROJECT_DATA_FOLDER=/tmp/mobility-project \
            -v "${GITHUB_WORKSPACE}/examples:/app/examples:ro" \
            -w /app \
            mobility-runtime:test \
            bash -lc "mkdir -p /tmp/mobility-data /tmp/mobility-project && python examples/quickstart-fr-ci.py"
        shell: bash

  publish:
    needs: validate
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish }}
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check publish branch
        if: ${{ github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/main' }}
        run: |
          echo "Manual image publishing must run from the main branch."
          exit 1
        shell: bash

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image tags
        id: image-tags
        run: |
          {
            echo "tags<<EOF"
            echo "ghcr.io/mobility-team/mobility-runtime:${{ needs.validate.outputs.mobility_version }}"
            echo "ghcr.io/mobility-team/mobility-runtime:${{ needs.validate.outputs.mobility_minor_version }}"
            echo "ghcr.io/mobility-team/mobility-runtime:sha-${GITHUB_SHA}"
            echo "ghcr.io/mobility-team/mobility-runtime:latest"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"
        shell: bash

      - name: Publish runtime image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: .github/docker/runtime/Dockerfile
          push: true
          tags: ${{ steps.image-tags.outputs.tags }}
          build-args: |
            MOBILITY_PACKAGE=${{ needs.validate.outputs.mobility_package }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
