on:
  workflow_call:
    inputs:
      requirements_file:
        required: true
        type: string
      use_min_dep_versions:
        required: false
        type: boolean
        default: false

jobs:
  build-ubuntu:
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/mobility-team/mobility-ci:ubuntu-24.04-r-4.4.1-py3.12
    strategy:
      max-parallel: 5
      fail-fast: false

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Select Python dependencies
      run: |
        if [[ "${{ inputs.use_min_dep_versions }}" == "true" ]]; then
          python_env="/opt/venv-min"
        else
          python_env="/opt/venv-ci"
        fi

        echo "VIRTUAL_ENV=${python_env}" >> "${GITHUB_ENV}"
        echo "${python_env}/bin" >> "${GITHUB_PATH}"
        echo "Using pre-installed Python dependencies from ${python_env}"
      shell: bash

    - name: Install current package
      run: |
        uv pip install --python "${VIRTUAL_ENV}/bin/python" -e . --no-deps
      shell: bash

    # The published CI image is only updated after merging. Synchronise the
    # declared R dependencies so pull requests test their own requirements.
    - name: Synchronise R dependencies
      run: |
        Rscript -e "options(repos = c(mobilityteam = 'https://mobility-team.r-universe.dev', CRAN = Sys.getenv('RSPM'))); pak::pkg_install('deps::.')"
      shell: bash

    - name: Install minimum test tools
      if: ${{ inputs.use_min_dep_versions }}
      run: |
        python -m pip install "pytest>=8,<10"
      shell: bash

    - name: Lint with flake8
      if: ${{ !inputs.use_min_dep_versions }}
      run: |
        python -m flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        python -m flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      shell: bash

    - name: Test unit with pytest
      if: ${{ !inputs.use_min_dep_versions }}
      run: |
        python -m pytest tests/back/unit --cov=mobility --cov-config=.coveragerc --cov-append --log-cli-level=INFO --clear_inputs
      shell: bash

    - name: Test integration with pytest
      if: ${{ !inputs.use_min_dep_versions }}
      run: |
        python -m pytest tests/back/integration --cov=mobility --cov-config=.coveragerc --cov-append --log-cli-level=INFO --clear_inputs
      shell: bash

    - name: Build coverage report
      if: ${{ !inputs.use_min_dep_versions }}
      run: |
        python -m coverage xml -o coverage.xml
      shell: bash

    - name: Test with pytest without coverage
      if: ${{ inputs.use_min_dep_versions }}
      run: |
        python -m pytest --log-cli-level=INFO --clear_inputs
      shell: bash

    - name: Build and check wheel
      run: |
        python -m pip wheel . --no-deps --no-build-isolation --wheel-dir dist
        python -m pip install --force-reinstall --no-deps dist/mobility_tools-*.whl
        temp_dir="$(mktemp -d)"
        cd "${temp_dir}"
        python "${GITHUB_WORKSPACE}/.github/scripts/check_runtime_resources.py"
      shell: bash

    - name: Upload coverage reports to Codecov
      if: ${{ !inputs.use_min_dep_versions }}
      uses: codecov/codecov-action@04b047e8bb82a0c002c8312c1c880fbc6a999d45 # v5
      with:
        files: coverage.xml
        verbose: true
