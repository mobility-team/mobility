name: Publish GitHub release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-artifacts:
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install build tool
        run: |
          python -m pip install "build>=1.5,<2"
        shell: bash

      - name: Check tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          python - <<'PY'
          import pathlib
          import os
          import tomllib

          package_version = tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"]
          tag_version = os.environ["GITHUB_REF_NAME"].removeprefix("v")

          if tag_version != package_version:
              raise SystemExit(
                  f"Release tag v{tag_version} does not match pyproject.toml version {package_version}."
              )

          print(f"Release tag v{tag_version} matches pyproject.toml.")
          PY
        shell: bash

      - name: Build wheel and source archive
        run: |
          python -m build --wheel --sdist --outdir dist
        shell: bash

      - name: Copy install environment files
        run: |
          cp environment.yml dist/environment.yml
          cp pixi-release.toml dist/pixi.toml
        shell: bash

      - name: Install wheel
        run: |
          python -m pip install --force-reinstall --no-deps dist/mobility_tools-*.whl
        shell: bash

      - name: Check wheel resources
        run: |
          temp_dir="$(mktemp -d)"
          cd "${temp_dir}"
          python "${GITHUB_WORKSPACE}/.github/scripts/check_runtime_resources.py"
        shell: bash

      - name: Upload release artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: mobility-release-artifacts
          path: dist/*

  publish-github-release:
    needs: build-artifacts
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: mobility-release-artifacts
          path: dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          draft: true
          generate_release_notes: true
          files: dist/*

  publish-pypi:
    needs: build-artifacts
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    environment: pypi
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: mobility-release-artifacts
          path: dist

      - name: Remove non-PyPI release assets
        run: |
          rm dist/environment.yml
          rm dist/pixi.toml
        shell: bash

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist

  publish-runtime-image:
    needs: [build-artifacts, publish-pypi]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download built artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: mobility-release-artifacts
          path: dist

      - name: Prepare image tags
        id: image-tags
        run: |
          version="${GITHUB_REF_NAME#v}"
          minor_version="${version%.*}"
          {
            echo "tags<<EOF"
            echo "ghcr.io/mobility-team/mobility-runtime:${version}"
            echo "ghcr.io/mobility-team/mobility-runtime:${minor_version}"
            echo "ghcr.io/mobility-team/mobility-runtime:sha-${GITHUB_SHA}"
            echo "ghcr.io/mobility-team/mobility-runtime:latest"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"
        shell: bash

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build runtime image for release checks
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: .github/docker/runtime/Dockerfile
          load: true
          tags: mobility-runtime:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Check Python import
        run: |
          docker run --rm mobility-runtime:test python -c "import mobility; print(mobility.__file__)"
        shell: bash

      - name: Check Mobility setup
        run: |
          docker run --rm mobility-runtime:test python -c "import mobility; mobility.set_params(package_data_folder_path='/tmp/mobility-data', project_data_folder_path='/tmp/mobility-project', debug=True)"
        shell: bash

      - name: Run quickstart
        run: |
          docker run --rm \
            -e MOBILITY_PACKAGE_DATA_FOLDER=/tmp/mobility-data \
            -e MOBILITY_PROJECT_DATA_FOLDER=/tmp/mobility-project \
            -v "${GITHUB_WORKSPACE}/examples:/app/examples:ro" \
            -w /app \
            mobility-runtime:test \
            bash -lc "mkdir -p /tmp/mobility-data /tmp/mobility-project && python examples/quickstart-fr-ci.py"
        shell: bash

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish runtime image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: .github/docker/runtime/Dockerfile
          push: true
          tags: ${{ steps.image-tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
